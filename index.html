<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Sajjad Sports - Advanced Live Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/city/index.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Branding Area */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }

        .logo-box {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #1e293b 40%, #0f172a 100%);
            border-radius: 50%;
            border: 4px solid #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-text-top {
            font-size: 11px;
            font-weight: 900;
            color: #f8fafc;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo-text-mid {
            font-size: 14px;
            font-weight: 900;
            color: #f59e0b;
        }

        .logo-icon {
            font-size: 20px;
        }

        h1 {
            color: #38bdf8;
            font-size: 2.4rem;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .subtitle {
            color: #94a3b8;
            margin: 0;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            border: 1px solid #334155;
        }

        /* Video.js Modern Custom Overrides */
        .player-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            background: #000000;
            margin-bottom: 15px;
            border: 1px solid #475569;
            overflow: hidden;
        }

        .video-js {
            width: 100% !important;
            height: auto;
            aspect-ratio: 16 / 9;
        }

        /* Fullscreen Master Action Button */
        .force-fullscreen-btn {
            width: 100%;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .force-fullscreen-btn:hover {
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
        }

        /* 3 Channels Interactive Grid Layout */
        .channel-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        @media (max-width: 600px) {
            .channel-list {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
        }

        .channel-btn {
            background: #334155;
            color: #f8fafc;
            border: 2px solid transparent;
            padding: 15px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .channel-btn:hover {
            background: #475569;
            border-color: #38bdf8;
        }

        .channel-btn.active {
            background: #0284c7;
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        .notice {
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <div class="logo-box">
            <span class="logo-text-top">PRINCE</span>
            <span class="logo-text-mid">SAJJAD</span>
            <span class="logo-icon">🏆</span>
            <span class="logo-text-top" style="color:#38bdf8; font-size:10px;">SPORTS</span>
        </div>
        <h1>Prince Sajjad Sports</h1>
        <p class="subtitle">Next-Gen Video.js Stream Engine with Dynamic TS Stream Decoding</p>
    </div>

    <div class="container">
        <div class="player-wrapper">
            <video id="sports-player" class="video-js vjs-theme-city" controls preload="auto" playsinline webkit-playsinline>
                <source src="https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <button class="force-fullscreen-btn" onclick="triggerNativeFullscreen()">
            📺 Click to Full Screen
        </button>

        <div class="channel-list">
            <button class="channel-btn active" onclick="switchLiveChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 'application/x-mpegURL', this)">BEIN TV (Bein 1)</button>
            
            <button class="channel-btn" onclick="switchLiveChannel('http://rgkkw.live/live/1Aoen7elp5/IgMJ60tmAa/130714.ts', 'video/mp2t', this)">T SPORTS</button>
            
            <button class="channel-btn" onclick="switchLiveChannel('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', 'application/x-mpegURL', this)">WIN TV (WIN Sports)</button>
        </div>
    </div>

    <p class="notice">💡 <b>Note:</b> If T Sports drops out, its token has expired. Swap the URL inside the button with a fresh streaming link to restore playback instantly.</p>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        // Initialize the advanced Video.js core player instance
        var player = videojs('sports-player', {
            autoplay: true,
            muted: false,
            fluid: true,
            html5: {
                vhs: {
                    overrideNative: true,
                    fastQualityChange: true, // Speeds up playback transitions
                    customConfiguration: {
                        maxBufferLength: 6, // Lean buffer to maintain absolute real-time stream tracking
                        liveSyncDurationCount: 2
                    }
                }
            }
        });

        // Zero-Lag Smooth Engine Channel Switcher
        function switchLiveChannel(url, type, buttonElement) {
            if (player) {
                player.src({
                    src: url,
                    type: type
                });
                player.play();
            }

            // Update UI selected states
            var buttons = document.getElementsByClassName('channel-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            if (buttonElement) buttonElement.classList.add('active');
        }

        // Hardware-Accelerated Viewport Scale Hook
        function triggerNativeFullscreen() {
            if (player) {
                if (player.isFullscreen()) {
                    player.exitFullscreen();
                } else {
                    player.requestFullscreen();
                }
            }
        }
    </script>
</body>
</html>
