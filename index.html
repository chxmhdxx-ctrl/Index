<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Sajjad - All-In-One Universal Stream Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }

        .logo-box {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #1e293b 40%, #0f172a 100%);
            border-radius: 50%;
            border: 4px solid #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-text-top { font-size: 11px; font-weight: 900; color: #f8fafc; letter-spacing: 1px; text-transform: uppercase; }
        .logo-text-mid { font-size: 14px; font-weight: 900; color: #f59e0b; }
        .logo-icon { font-size: 20px; }

        h1 {
            color: #38bdf8;
            font-size: 2.4rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .subtitle { color: #94a3b8; margin: 5px 0 0 0; font-size: 14px; }

        .container {
            width: 100%;
            max-width: 950px;
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            border: 1px solid #334155;
            box-sizing: border-box;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            background: #000000;
            margin-bottom: 15px;
            border: 1px solid #475569;
            overflow: hidden;
        }

        .plyr {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        video {
            width: 100% !important;
            height: auto !important;
            display: block;
            object-fit: contain;
        }

        .link-paster-box {
            background: #111827;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #4b5563;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .link-input {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            padding: 12px 15px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .link-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .play-btn {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-btn:hover {
            background: #fbbf24;
        }

        .channel-section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .channel-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 🟢 ৩টি বাটনের জন্য গ্রিড ৩ কলাম করা হলো */
            gap: 12px;
        }

        .plyr--full-ui input[type=range] {
            color: #38bdf8 !important;
        }
        .plyr__control--overlaid {
            background: #38bdf8 !important;
            color: #0f172a !important;
        }
        .plyr__menu__container [role=menuitemradio][aria-checked=true]::before {
            background: #38bdf8 !important;
        }

        @media (max-width: 600px) {
            .channel-list { grid-template-columns: 1fr; }
            .link-paster-box { flex-direction: column; }
            .play-btn { padding: 12px; }
            h1 { font-size: 1.8rem; }
        }

        .channel-btn {
            background: #334155;
            color: #f8fafc;
            border: 2px solid transparent;
            padding: 14px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .channel-btn:hover {
            background: #475569;
            border-color: #38bdf8;
        }

        .channel-btn.active {
            background: #0284c7;
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        .notice {
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <div class="logo-box">
            <span class="logo-text-top">PRINCE</span>
            <span class="logo-text-mid">SAJJAD</span>
            <span class="logo-icon">🌐</span>
            <span class="logo-text-top" style="color:#38bdf8; font-size:10px;">STREAM</span>
        </div>
        <h1>Universal Player</h1>
        <p class="subtitle">All-In-One Live M3U8 Decoder Terminal</p>
    </div>

    <div class="container">
        <div class="player-wrapper">
            <video id="hls-core-player" controls autoplay playsinline></video>
        </div>

        <div class="link-paster-box">
            <input type="text" id="custom-url-input" class="link-input" placeholder="Paste your .m3u8 or live stream URL here...">
            <button class="play-btn" onclick="playCustomLink()">Play Stream</button>
        </div>

        <div class="channel-section-title">Quick Presets / Channels</div>
        <div class="channel-list">
            <button class="channel-btn" onclick="loadHlsStream('https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8', this)">D SPORTS</button>
            <button class="channel-btn" onclick="loadHlsStream('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', this)">BEIN TV</button>
            <button class="channel-btn" onclick="loadHlsStream('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', this)">WIN SPORTS</button>
        </div>
    </div>

    <p class="notice">💡 <b>How to use:</b> Select any Quick Preset channel below, or paste a custom live M3U8 stream destination path into the input engine console bar above and tap "Play Stream".</p>

    <script>
        var videoElement = document.getElementById('hls-core-player');
        var hlsEngineInstance = null;
        var plyrPlayer = null;

        document.addEventListener('DOMContentLoaded', function() {
            plyrPlayer = new Plyr(videoElement, {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                tooltips: { controls: true, seek: false },
                settings: ['quality', 'speed']
            });

            // 🟢 ফিক্স: প্রথমবার পেজ লোড হলে নতুন এক নম্বর বাটন (D SPORTS) অটো-প্লে হবে
            var primaryChannelButton = document.getElementsByClassName('channel-btn')[0];
            loadHlsStream('https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8', primaryChannelButton, true);
        });

        function loadHlsStream(streamUrl, buttonElement, isInitialLoad = false) {
            if (hlsEngineInstance) {
                hlsEngineInstance.destroy();
                hlsEngineInstance = null;
            }

            if (!streamUrl || streamUrl.trim() === "") {
                alert("Please enter a valid live stream URL path.");
                return;
            }

            if (Hls.isSupported()) {
                hlsEngineInstance = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 10,          
                    maxBufferLength: 8,            
                    maxMaxBufferLength: 12,        
                    liveSyncDurationCount: 3,      
                    manifestLoadingMaxRetry: 15,   
                    manifestLoadingRetryDelay: 1000,
                    levelLoadingMaxRetry: 15,
                    levelLoadingRetryDelay: 1000,
                    abrEwmaDefaultEstimate: 5000000 
                });

                hlsEngineInstance.loadSource(streamUrl.trim());
                hlsEngineInstance.attachMedia(videoElement);
                
                hlsEngineInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    if(plyrPlayer) {
                        if (isInitialLoad) {
                            videoElement.muted = true;
                            plyrPlayer.play();
                        } else {
                            videoElement.muted = false;
                            plyrPlayer.play().catch(function() {
                                videoElement.muted = true;
                                plyrPlayer.play();
                            });
                        }
                    }
                });

                hlsEngineInstance.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Network drop caught, recovering...");
                                hlsEngineInstance.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("Media stall caught, recovering media...");
                                hlsEngineInstance.recoverMediaError();
                                break;
                            default:
                                break;
                        }
                    }
                });

            } 
            else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = streamUrl.trim();
                videoElement.addEventListener('loadedmetadata', function() {
                    if(plyrPlayer) {
                        if (isInitialLoad) {
                            videoElement.muted = true;
                        } else {
                            videoElement.muted = false;
                        }
                        plyrPlayer.play();
                    }
                });
            }

            var buttons = document.getElementsByClassName('channel-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            if (buttonElement) buttonElement.classList.add('active');
        }

        function playCustomLink() {
            var inputUrl = document.getElementById('custom-url-input').value.trim();
            loadHlsStream(inputUrl, null, false);
        }
    </script>
</body>
</html>
